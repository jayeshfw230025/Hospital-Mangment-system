spring:
  datasource:
    url: jdbc:h2:file:./data/hms-local;MODE=MySQL;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration

hms:
  crypto:
    secret-key: local-dev-secret-key-not-for-production
  jwt:
    secret-key: local-dev-jwt-secret-key-not-for-production-min-32-bytes-long
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 604800
  investigation:
    report-storage-path: ./data/investigation-reports
  prescription:
    pdf-storage-path: ./data/prescription-pdfs
  admission:
    consent-storage-path: ./data/admission-consents

logging:
  level:
    com.hms: DEBUG
