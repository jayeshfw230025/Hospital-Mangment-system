spring:
  datasource:
    url: jdbc:h2:mem:hms_test;MODE=MySQL;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

hms:
  crypto:
    secret-key: test-secret-key-not-for-production
  jwt:
    secret-key: test-jwt-secret-key-not-for-production-min-32-bytes-long
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 604800
  patient:
    upid-prefix: UPID
  investigation:
    report-storage-path: ./target/test-investigation-reports
  prescription:
    pdf-storage-path: ./target/test-prescription-pdfs
  admission:
    consent-storage-path: ./target/test-admission-consents
